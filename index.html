<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тільки для тебе</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* М'яка стабільна пульсація всього серця */
            animation: heart-pulse 2s infinite ease-in-out;
        }

        .love-word {
            position: absolute;
            color: #ff1a1a;
            font-size: 11px;
            white-space: nowrap;
            text-shadow: 0 0 8px #ff0000;
            transform: translate(-50%, -50%);
            /* Плавна хвиля прозорості (анімація зникнення) */
            animation: wave-opacity 3s infinite ease-in-out;
        }

        /* Стиль для Тонкої V з "you" */
        .v-word {
            color: #fff; /* Біла V */
            font-size: 9px; /* Менший шрифт для витонченості */
            text-shadow: 0 0 10px #fff;
            z-index: 10;
            /* V пульсує синхронно з серцем */
            animation: v-glow 2s infinite ease-in-out;
        }

        /* 1. Пульсація всього серця */
        @keyframes heart-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* 2. Спокійна хвиля прозорості для контуру */
        @keyframes wave-opacity {
            0%, 100% { opacity: 1; filter: blur(0px); }
            50% { opacity: 0.2; filter: blur(1px); } /* Трохи сильніше зникнення для ефекту тіні */
        }

        /* 3. М'яке світіння для V */
        @keyframes v-glow {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="container" id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const centerX = 300;
        const centerY = 300;

        // 1. КОНТУР СЕРЦЯ З ХВИЛЕЮ ("I love you")
        const contourWordsCount = 200; 
        const heartScale = 18; 

        for (let i = 0; i < contourWordsCount; i++) {
            const word = document.createElement('div');
            word.className = 'love-word';
            word.innerText = 'I love you'; // Контур залишається повним

            const t = (i / contourWordsCount) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

            word.style.left = `${(x * heartScale) + centerX}px`;
            word.style.top = `${(y * heartScale) + centerY}px`;

            // Створюємо ефект хвилі
            word.style.animationDelay = `${(i / contourWordsCount) * 3}s`;

            container.appendChild(word);
        }

        // 2. ТОНКА ЛІТЕРА V ТІЛЬКИ З "you"
        const vWordsCount = 40; // Менше слів для V
        const vHeight = 90; // Висота V
        const vWidth = 35;   // Значно менша ширина

        for (let i = 0; i < vWordsCount; i++) {
            const word = document.createElement('div');
            word.className = 'love-word v-word';
            word.innerText = 'you'; // !!! ТІЛЬКИ "YOU" !!!

            let posX, posY;
            const sideWords = vWordsCount / 2;

            if (i < sideWords) {
                // Ліва лінія
                const progress = i / sideWords;
                posX = centerX - (vWidth / 2) + (progress * (vWidth / 2));
                posY = centerY - (vHeight / 4) + (progress * vHeight);
            } else {
                // Права лінія
                const progress = (i - sideWords) / sideWords;
                posX = centerX + (progress * (vWidth / 2));
                posY = centerY + (vHeight * 0.75) - (progress * vHeight);
            }

            word.style.left = `${posX}px`;
            word.style.top = `${posY}px`;
            
            // Затримка анімації, щоб V переливалася
            word.style.animationDelay = `${(i / vWordsCount) * 0.2}s`;

            container.appendChild(word);
        }
    </script>
</body>
</html>
